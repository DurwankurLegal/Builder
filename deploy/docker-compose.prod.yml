# Builder CRM - production stack for builder.durwankur.com
#
# ISOLATION CONTRACT (why this cannot disturb cctv/dsa):
#   * Every published port binds to 127.0.0.1 only - nothing new is exposed on
#     the public interface. Only the host's existing nginx serves :80/:443.
#   * Ports are deliberately in an uncommon range (18xxx) to avoid collisions.
#   * Container names, volumes and the docker network are all prefixed
#     `buildercrm_` via COMPOSE_PROJECT_NAME, so no existing object is reused.
#   * Its own PostgreSQL and Redis instances - no shared database.
#   * Memory limits keep the stack from starving the other applications.
#
# Usage:  docker compose -f docker-compose.prod.yml --env-file .env up -d

name: buildercrm

services:
  postgres:
    image: postgres:15-alpine
    container_name: buildercrm_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:18432:5432"     # loopback only - not reachable from outside
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: buildercrm_prod_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:18379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.prod.Dockerfile
    image: buildercrm-backend:prod
    container_name: buildercrm_prod_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      BACKEND_CORS_ORIGINS: '["https://${APP_DOMAIN}"]'
      # Single process owns the AI calling loop (see deploy/README.md)
      RUN_AI_AGENT: ${RUN_AI_AGENT:-1}
      SEED_DEMO_DATA: "0"
      # HireBuddha voice integration (see docs/HIREBUDDHA_INTEGRATION.md)
      HIREBUDDHA_ENABLED: ${HIREBUDDHA_ENABLED:-1}
      HIREBUDDHA_CALLBACK_TOKEN: ${HIREBUDDHA_CALLBACK_TOKEN:?generate with openssl rand -hex 32}
      HIREBUDDHA_CLIENT_ID: ${HIREBUDDHA_CLIENT_ID:-3ffe9166-8dae-4488-a6a4-387dad47f3f7}
      HIREBUDDHA_ENTITY_ID: ${HIREBUDDHA_ENTITY_ID:-65b0ec26-42c1-4a63-b03e-68692ee30c9b}
    ports:
      - "127.0.0.1:18000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.prod.Dockerfile
      args:
        VITE_API_BASE_URL: https://${APP_DOMAIN}/api/v1
    image: buildercrm-frontend:prod
    container_name: buildercrm_prod_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

volumes:
  postgres_data:
    name: buildercrm_prod_postgres_data
  redis_data:
    name: buildercrm_prod_redis_data

networks:
  default:
    name: buildercrm_prod_net
