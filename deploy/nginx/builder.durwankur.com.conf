# Builder CRM - host nginx vhost for builder.durwankur.com
#
# Install as a NEW file:
#   /etc/nginx/sites-available/builder.durwankur.com
# then symlink into sites-enabled. Existing vhosts (cctv, dsa) are never
# opened or modified — this only adds a server block for its own server_name.
#
# Certbot will rewrite the TLS lines below when you run:
#   sudo certbot --nginx -d builder.durwankur.com

server {
    listen 80;
    listen [::]:80;
    server_name builder.durwankur.com;

    # ACME challenge for certificate issuance/renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name builder.durwankur.com;

    # --- TLS (managed by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/builder.durwankur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/builder.durwankur.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # Bulk lead imports need room; keep bounded to avoid abuse
    client_max_body_size 25M;

    access_log /var/log/nginx/builder.durwankur.com.access.log;
    error_log  /var/log/nginx/builder.durwankur.com.error.log;

    # --- API -> backend container (loopback only) ---
    location /api/ {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Interactive API docs and health (optional - restrict or remove in prod)
    location ~ ^/(docs|redoc|openapi.json|health)$ {
        proxy_pass http://127.0.0.1:18000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prometheus metrics - keep private
    location /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:18000;
    }

    # --- Everything else -> static SPA container ---
    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
